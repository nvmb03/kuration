    }
    #back:hover {
      background: rgba(255,120,30,0.2);
      border-color: rgba(255,170,70,1);
      color: #fff;
    }

    #label {
      position: fixed;
      bottom: 36px;
      right: 36px;
      z-index: 20;
      font-family: 'Manrope', sans-serif;
      font-size: 10px;

      letter-spacing: 0.28em;
      text-transform: uppercase;

<body>

<a id="back" href="../index.html">
  <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M7 1.5L3.5 5.5 7 9.5"/>
  </svg>
  Zurück
</a>
<div id="label">Inside / Outside</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>

const BODY = [

"@%==------------------------------------------------------------=================++++++++++*********",
"@%=---------------------------------------------------------------===============+++++++++**********",
"++=--------------------------------------------------------------================+++++++++**********",

"#---------------------------------=-----=+===+**++=++==#++==**============+++++++++*****************",
"@-----------------------------------%--==*+=+##+#*==++###=#*#=++========++++++++++******************",
"==-----------------------------------+----+*=*=#*++#=%=+%++=*==+=======++++++++++*******************",
"+=-------------------------------------+--+==*=*=+*=*#*#=*%+**#++++++#++++++++++********************",
"@--------------------------------------=*==+=*-**+*+=+**+**+===+==++++*#%##*##+*********************",
"%-------------------------------------##+*#*#*++++#=****#**+++==++***#*+*##*###%*#******************",
"+--------------------------------=#+*--=+==*+*=#+*+=+++===*+=====++++++++++++***#%******************",
"+-----------------------------=##-*+---=-==++=+*=##=*=*========+++++++++++++******%*#***************",

"=--=---------------------%#-=#----=++==============++++++++++++************%**#*%*******************",
"+--=----------------------%#++-+--*---===========#=+++++++++++************####**@*#*****************",

"=--------------------------==*+==+=+==============+++++*+++**************%#%*#%############*##******",
"-----------------------------==%================+*++++++++**************#%####%###########*#********",
"---=---------------------------+#==============++++++++++***************%##%#@##############********",
"=--=----------------------------%==-============+++++++++*************##@%###%###########**#********",
"=------------------------------=+#+============++#+++++++************##@####%#############**********",

"=------------------------===*+==+==+=++++++++****#*******###*##################%########************",
"-----------------------=====+===+==++++++++++*************#####################%#####***************",
"-----------------------====#*=====+=+++++*+++************#*#*#################@###******************",
"-----------------------=====#*====+==++++++++**************#*#################%%********************",

"=------------------=============+*%+**+*#%#*###*****##%###%#%###########**************++++++++++++++",

"=-=----========================++++++++*************###############*************++++++++++++++++++++",
"==============================++++++++*************###############************++++++++++++++++++++++",
"=============================+++++++++************###############*************++++++++++++++++++++++",
"============================++++++++***********################**************+++++++++++++++++++++++",
"+=========================+++++++++***********################*************+++++++++++++++++++++++++",
"========================+++++++++***********##################**************++++++++++++++++++++++++",
"=======================++++++++++*********###################**************+++++++++++++++++++++++++",
"======================+++++++++**********###################*************+++++++++++++++++++++++++++",
"*===================++++++++++**********###################************+++++++++++++++++++++++++++++",
];

function density(ch) {
  if (ch === '@' || ch === '%') return 1.00;
  if (ch === '#')               return 0.85;
  if (ch === '*')               return 0.68;
  if (ch === '+')               return 0.38;
  if (ch === '=')               return 0.10;
  if (ch === '-')               return 0.03;
  return 0;
}

let ROWS, COLS, CW, CH, OX, OY;

const SWEEP_FRAMES = 280;  // ~4.5 s cycle — schneller
const BAND_WIDTH   = 0.16; // breiter und kräftiger

function setup() {
  createCanvas(windowWidth, windowHeight);
  textFont('Courier New');
  noStroke();
  textAlign(LEFT, TOP);
  calcLayout();
}

function calcLayout() {
  ROWS = BODY.length;
  COLS = BODY[0].length;
  const RATIO = 1.78;
  CW = min(width * 0.84 / COLS, height * 0.88 / (ROWS * RATIO));
  CH = CW * RATIO;
  OX = (width  - COLS * CW) / 2;
  OY = (height - ROWS * CH) / 2;
}

function draw() {
  background(0);

  const sweep = (frameCount % SWEEP_FRAMES) / SWEEP_FRAMES; // 0..1

  textSize(CW * 1.04);

  for (let r = 0; r < ROWS; r++) {
    const row = BODY[r];
    for (let c = 0; c < row.length; c++) {
      const ch = row[c];
      if (ch === ' ') continue;
      const d = density(ch);
      if (d === 0) continue;

      const x = OX + c * CW;
      const y = OY + r * CH;

      if (d < 0.38) {
        drawingContext.shadowBlur = 0;
        fill(`hsl(10,5%,${d * 13}%)`);
        text(ch, x, y);
        continue;
      }

      const t0 = (d - 0.38) / 0.62;

      // diagonal projection 0..1 across the figure
      const proj = (c / COLS + r / ROWS) / 2;

      // distance from sweep band, with wrap
      const raw  = abs(proj - sweep);
      const dist = min(raw, abs(raw - 1));
      const inBand     = max(0, 1 - dist / BAND_WIDTH);
      const sweepBoost = inBand * inBand; // sharper falloff

      const hBase = 8  + t0 * 28;
      const sBase = 52 + t0 * 34;
      const lBase = 16 + t0 * 44;

      // inside band: push hard toward bright white
      const lFill = lBase + sweepBoost * (98 - lBase);
      const sFill = sBase * (1 - sweepBoost * 0.9);

      if (sweepBoost > 0.01) {
        drawingContext.shadowBlur  = sweepBoost * 45;
        drawingContext.shadowColor = `rgba(255,235,180,${sweepBoost})`;
      } else {
        drawingContext.shadowBlur  = t0 * 5;
        drawingContext.shadowColor = `hsl(20,80%,28%)`;
      }

      fill(`hsl(${hBase},${sFill}%,${min(lFill, 94)}%)`);
      text(ch, x, y);
    }
  }

  drawingContext.shadowBlur = 0;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  calcLayout();
}
</script>
</body>
</html>
