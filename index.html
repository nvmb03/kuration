<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kuration — Nam Nguyen Danh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Manrope:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:        #0a0f1a;
      --arctic:     #fafcfd;
      --resonance:  #edf76a;
      --dim:        rgba(250,252,253,0.28);
      --border:     rgba(250,252,253,0.09);
      --hover-bg:   rgba(250,252,253,0.04);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--ink);
      color: var(--arctic);
      overflow: hidden;
    }

    /* ── wordmark top-left ── */
    .wordmark {
      position: fixed;
      top: 36px; left: 36px;
      z-index: 10;
    }

    .wordmark-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--arctic);
      opacity: 0.7;
    }

    /* ── semester label top-right ── */
    .semester {
      position: fixed;
      top: 36px; right: 36px;
      font-family: 'Manrope', sans-serif;
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--dim);
      z-index: 10;
    }

    /* ── full-page grid ── */
    .stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: 1fr auto 1fr;
      gap: 0;
      padding: 100px 80px 60px;
    }

    /* center cell */
    .center {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 60px;
      user-select: none;
    }

    .title-tag {
      font-family: 'Manrope', sans-serif;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 16px;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 6vw, 96px);
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--arctic);
      white-space: nowrap;
    }

    .title-rule {
      width: 1px;
      height: 40px;
      background: var(--border);
      margin-top: 24px;
    }

    /* ── quadrant cells ── */
    .q { display: flex; align-items: center; justify-content: center; }
    .q-tl { grid-column: 1; grid-row: 1; justify-content: flex-end; align-items: flex-end; padding: 0 48px 36px 0; }
    .q-tr { grid-column: 3; grid-row: 1; justify-content: flex-start; align-items: flex-end; padding: 0 0 36px 48px; }
    .q-bl { grid-column: 1; grid-row: 3; justify-content: flex-end; align-items: flex-start; padding: 36px 48px 0 0; }
    .q-br { grid-column: 3; grid-row: 3; justify-content: flex-start; align-items: flex-start; padding: 36px 0 0 48px; }

    /* connector lines from center */
    .q-tl .card { margin-bottom: 0; }

    /* ── project card ── */
    .card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 240px;
      padding: 24px 26px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--arctic);
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
      background: transparent;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--hover-bg);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover { border-color: rgba(237,247,106,0.35); }
    .card:hover::before { opacity: 1; }

    .card-num {
      font-family: 'Manrope', sans-serif;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--dim);
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 1.1;
    }

    .card:hover .card-title { color: var(--resonance); transition: color 0.2s; }

    .card-desc {
      font-family: 'Manrope', sans-serif;
      font-size: 10px;
      font-weight: 300;
      color: var(--dim);
      line-height: 1.8;
      letter-spacing: 0.04em;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }

    .pill {
      font-family: 'Manrope', sans-serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 3px 7px;
      color: var(--dim);
    }

    /* ── empty placeholder ── */
    .card-empty {
      width: 240px;
      height: 130px;
      border: 1px dashed rgba(250,252,253,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-empty span {
      font-family: 'Manrope', sans-serif;
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(250,252,253,0.12);
    }

    /* ── thin connector lines between cards and center ── */
    .line-h {
      position: fixed;
      top: 50%;
      height: 1px;
      background: var(--border);
      pointer-events: none;
    }

    /* ── project count bottom ── */
    .count {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Manrope', sans-serif;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--dim);
    }
  </style>
</head>
<body>

<div class="wordmark">
  <span class="wordmark-name">Nam Nguyen Danh</span>
</div>

<span class="semester">Fach Kuration &nbsp;—&nbsp; SS 2026</span>

<div class="stage">

  <!-- TOP LEFT -->
  <div class="q q-tl">
    <a class="card" href="ascii-aura/index.html">
      <div class="card-num">01 &nbsp;/&nbsp; Figurstudie</div>
      <div class="card-title">ASCII Aura</div>
      <div class="card-desc">Körper als Code. Aura-Energie<br>in Echtzeit — p5.js, dark mode.</div>
      <div class="card-tags">
        <span class="pill">p5.js</span>
        <span class="pill">ASCII</span>
        <span class="pill">Interaktiv</span>
      </div>
    </a>
  </div>

  <!-- TOP RIGHT -->
  <div class="q q-tr">
    <div class="card-empty"><span>— folgt —</span></div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="title-tag">Fach Kuration</div>
    <div class="title">Kuration</div>
    <div class="title-rule"></div>
  </div>

  <!-- BOTTOM LEFT -->
  <div class="q q-bl">
    <div class="card-empty"><span>— folgt —</span></div>
  </div>

  <!-- BOTTOM RIGHT -->
  <div class="q q-br">
    <div class="card-empty"><span>— folgt —</span></div>
  </div>

</div>

<div class="count" id="count"></div>

<script>
  const n = document.querySelectorAll('.card:not(.card-empty)').length;
  document.getElementById('count').textContent = n + ' Projekt' + (n !== 1 ? 'e' : '');
</script>

</body>
</html>
