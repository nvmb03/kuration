<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kuration — Projekte</title>
  <style>
    :root {
      --bg:   #060608;
      --fg:   #e8e8f0;
      --dim:  #4a4a5e;
      --accent: #7c5cfc;
      --accent2: #3ecfcf;
      --card-bg: #0e0e16;
      --card-border: #1c1c2e;
      --hover: #16162a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── header ── */
    header {
      padding: 48px 48px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 0.15em;
      margin-top: 6px;
    }

    /* ── grid ── */
    main {
      padding: 48px;
      flex: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* ── project card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      background: var(--hover);
      border-color: var(--accent);
    }

    .card-num {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--dim);
    }

    .card-title {
      font-size: 18px;
      letter-spacing: 0.06em;
    }

    .card-desc {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.7;
      letter-spacing: 0.05em;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: auto;
      padding-top: 8px;
    }

    .pill {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 1px solid var(--card-border);
      border-radius: 2px;
      padding: 3px 8px;
      color: var(--dim);
    }

    .card:hover .pill {
      border-color: #2a2a40;
    }

    /* accent glow on hover */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
      background: radial-gradient(ellipse at top left, rgba(124,92,252,0.06), transparent 60%);
    }
    .card:hover::after { opacity: 1; }

    /* ── add-new placeholder card ── */
    .card-add {
      border-style: dashed;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      gap: 10px;
      cursor: default;
    }

    .card-add:hover {
      border-color: var(--dim);
      background: var(--card-bg);
    }

    .card-add span {
      font-size: 22px;
      color: var(--dim);
    }

    .card-add p {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--dim);
      text-transform: uppercase;
    }

    /* ── footer ── */
    footer {
      padding: 24px 48px;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--dim);
      border-top: 1px solid var(--card-border);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

<header>
  <div class="tag">Fach Kuration</div>
  <h1>Projekte</h1>
  <p class="subtitle">Hochschule &nbsp;/&nbsp; Sommersemester 2026</p>
</header>

<main>
  <div class="grid" id="grid">

    <!-- ── Projekt 01 ── -->
    <a class="card" href="ascii-aura/index.html">
      <div class="card-num">01</div>
      <div class="card-title">ASCII Aura</div>
      <div class="card-desc">
        Figurenstudie in ASCII-Zeichen.<br>
        Körper als Code — sanfte Aura-Energie<br>
        in Echtzeit mit p5.js.
      </div>
      <div class="card-tags">
        <span class="pill">p5.js</span>
        <span class="pill">ASCII</span>
        <span class="pill">Figur</span>
        <span class="pill">Glow</span>
      </div>
    </a>

    <!-- ── Platzhalter für weitere Projekte ── -->
    <div class="card card-add">
      <span>+</span>
      <p>Neues Projekt</p>
    </div>

  </div>
</main>

<footer>
  <span>kuration — 2026</span>
  <span id="count"></span>
</footer>

<script>
  const cards = document.querySelectorAll('.card:not(.card-add)');
  document.getElementById('count').textContent = cards.length + ' projekt' + (cards.length !== 1 ? 'e' : '');
</script>

</body>
</html>
